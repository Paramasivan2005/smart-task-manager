<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Managemnt</title>
    <link rel="shortcut icon" href="./assets/favicon.png">
    <link rel="stylesheet" href="./css/input.css">
</head>

<body>
    <div class="w-[90%] lg:w-[80%] min-h-screen lg:h-screen py-6 mx-auto flex items-center">

        <div class="w-full h-4/5 grid grid-cols-1 md:grid-cols-2 bg-slate-200 rounded-2xl overflow-hidden">

            <!-- LEFT SIDE -->
            <section class="py-10 lg:py-5 flex items-center border-none lg:border-r bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100">
                <div class=" w-full">
                    <h1 class="p-5 text-4xl md:text-2xl lg:text-5xl lg:p-2 md:p-0 font-lobster flex gap-2 items-center justify-center underline text-indigo-600 cursor-pointer text-center lg:text-start"
                        onclick="refresh()">
                        <img src="assets/favicon.png" alt="image" class="w-5 lg:w-9 hidden md:block">
                        Smart Task Management
                    </h1>
                    <p class="mt-6 text-4xl md:text-3xl lg:text-4xl p-7 text-center font-jost text-slate-800">Welcome Back 👋</p>
                    <p class="mt-2 text-2xl md:text-xl lg:text-2xl p-5 font-jost text-wrap mx-auto text-center text-slate-800">Login to manage
                        your tasks efficiently
                        and stay productive.</p>
                </div>
            </section>

            <!-- RIGHT SIDE -->
            <section class="py-6 bg-slate-900 flex items-center justify-center">
                <div class="w-3/5">
                    <h2 id="formTitle"
                        class="text-3xl font-bold text-center text-gray-800 dark:text-white mb-6 transition-all duration-300">
                        Login
                    </h2>

                    <!-- Error Message -->
                    <p id="errorMsg" class="text-red-500 text-sm text-center mb-4"></p>

                    <form id="authForm" class="space-y-4 transition-all duration-300">

                        <!-- Full Name -->
                        <div id="nameField" class="hidden transition-all duration-300">
                            <label class="block text-gray-600 dark:text-gray-300 mb-1">Full Name</label>
                            <input id="fullname" type="text"
                                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none dark:bg-gray-800 dark:text-white">
                        </div>

                        <!-- Email -->
                        <div>
                            <label class="block text-gray-600 dark:text-gray-300 mb-1">Email</label>
                            <input id="email" type="email"
                                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none dark:bg-gray-800 dark:text-white"
                                required>
                        </div>

                        <!-- Password -->
                        <div>
                            <label class="block text-gray-600 dark:text-gray-300 mb-1">Password</label>
                            <div class="relative">
                                <input id="password" type="password"
                                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none dark:bg-gray-800 dark:text-white"
                                    required>
                                <button type="button" id="togglePassword"
                                    class="absolute right-3 top-2 text-sm text-gray-500 dark:text-gray-300 cursor-pointer">
                                    Show
                                </button>
                            </div>
                        </div>

                        <!-- Submit -->
                        <button id="submitBtn"
                            class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition duration-300 cursor-pointer">
                            Login
                        </button>

                        <!-- Toggle -->
                        <p class="text-sm text-center text-gray-600 dark:text-gray-400">
                            <span id="toggleText">Don't have an account?</span>
                            <button type="button" id="toggleBtn"
                                class="text-indigo-600 font-semibold hover:underline cursor-pointer">
                                Sign Up
                            </button>
                        </p>

                    </form>
                </div>
        </div>
        </section>

    </div>
    <script src="./js/auth.js"></script>
</body>

</html>
